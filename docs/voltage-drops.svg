<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <style>
    .lab { font-family: 'SF Mono', 'Cascadia Code', Consolas, monospace; }
    .bod { font-family: system-ui, -apple-system, sans-serif; }
  </style>
  <rect x="0" y="0" width="480" height="160" rx="8" fill="#faf8f5"/>

  <text x="20" y="22" class="bod" font-size="11" fill="#1c1917" font-weight="600">Crossings ranked by voltage drop</text>
  <text x="20" y="36" class="lab" font-size="9" fill="#78716c">High drop = high current = critical bottleneck. Claim these first.</text>

  <!-- Hot crossings -->
  <g transform="translate(20, 48)">
    <rect x="0" y="0" width="200" height="24" rx="4" fill="#dc2626" opacity="0.12" stroke="#dc2626" stroke-width="1"/>
    <text x="8" y="16" class="lab" font-size="10" fill="#dc2626" font-weight="600">c17  vdrop = 0.42</text>
    <rect x="200" y="4" width="126" height="16" rx="3" fill="#dc2626" opacity="0.3"/>

    <rect x="0" y="30" width="200" height="24" rx="4" fill="#ea580c" opacity="0.1" stroke="#ea580c" stroke-width="1"/>
    <text x="8" y="46" class="lab" font-size="10" fill="#ea580c" font-weight="600">c22  vdrop = 0.31</text>
    <rect x="200" y="34" width="93" height="16" rx="3" fill="#ea580c" opacity="0.25"/>

    <rect x="0" y="60" width="200" height="24" rx="4" fill="#d97706" opacity="0.08" stroke="#d97706" stroke-width="1"/>
    <text x="8" y="76" class="lab" font-size="10" fill="#d97706" font-weight="600">c09  vdrop = 0.18</text>
    <rect x="200" y="64" width="54" height="16" rx="3" fill="#d97706" opacity="0.2"/>

    <rect x="0" y="90" width="200" height="24" rx="4" fill="#78716c" opacity="0.06" stroke="#78716c" stroke-width="0.5"/>
    <text x="8" y="106" class="lab" font-size="10" fill="#78716c" font-weight="500">c55  vdrop = 0.04</text>
    <rect x="200" y="94" width="12" height="16" rx="2" fill="#78716c" opacity="0.15"/>
  </g>

  <!-- Annotation -->
  <text x="360" y="72" class="lab" font-size="9" fill="#b45309" text-anchor="middle" font-weight="500">score =</text>
  <text x="360" y="86" class="lab" font-size="9" fill="#b45309" text-anchor="middle">red_vd &#215; 2000</text>
  <text x="360" y="100" class="lab" font-size="9" fill="#b45309" text-anchor="middle">+ blue_vd &#215; 1000</text>
</svg>
