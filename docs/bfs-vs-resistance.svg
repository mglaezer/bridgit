<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200">
  <style>
    .lab { font-family: 'SF Mono', 'Cascadia Code', Consolas, monospace; }
  </style>
  <rect x="0" y="0" width="520" height="200" rx="8" fill="#faf8f5"/>

  <!-- Left: BFS -->
  <rect x="10" y="10" width="240" height="180" rx="6" fill="#ffffff" stroke="#e5e2de" stroke-width="1"/>
  <text x="130" y="30" class="lab" font-size="11" fill="#78716c" text-anchor="middle" font-weight="600">BFS: distance = 3</text>

  <circle cx="50" cy="105" r="14" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="2"/>
  <text x="50" y="109" class="lab" font-size="9" fill="#d97706" text-anchor="middle">S</text>
  <circle cx="210" cy="105" r="14" fill="#0f766e" opacity="0.15" stroke="#0f766e" stroke-width="2"/>
  <text x="210" y="109" class="lab" font-size="9" fill="#0f766e" text-anchor="middle">T</text>

  <!-- Path 1 (top, highlighted) -->
  <circle cx="103" cy="60" r="10" fill="#2563eb" opacity="0.12" stroke="#2563eb" stroke-width="1.5"/>
  <circle cx="157" cy="60" r="10" fill="#2563eb" opacity="0.12" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="64" y1="95" x2="93" y2="66" stroke="#2563eb" stroke-width="2"/>
  <line x1="113" y1="60" x2="147" y2="60" stroke="#2563eb" stroke-width="2"/>
  <line x1="167" y1="66" x2="196" y2="95" stroke="#2563eb" stroke-width="2"/>

  <!-- Path 2 (middle, faint) -->
  <circle cx="103" cy="105" r="10" fill="#a8a29e" opacity="0.08" stroke="#a8a29e" stroke-width="1"/>
  <circle cx="157" cy="105" r="10" fill="#a8a29e" opacity="0.08" stroke="#a8a29e" stroke-width="1"/>
  <line x1="64" y1="105" x2="93" y2="105" stroke="#a8a29e" stroke-width="1" opacity="0.3"/>
  <line x1="113" y1="105" x2="147" y2="105" stroke="#a8a29e" stroke-width="1" opacity="0.3"/>
  <line x1="167" y1="105" x2="196" y2="105" stroke="#a8a29e" stroke-width="1" opacity="0.3"/>

  <!-- Path 3 (bottom, faint) -->
  <circle cx="103" cy="150" r="10" fill="#a8a29e" opacity="0.08" stroke="#a8a29e" stroke-width="1"/>
  <circle cx="157" cy="150" r="10" fill="#a8a29e" opacity="0.08" stroke="#a8a29e" stroke-width="1"/>
  <line x1="64" y1="115" x2="93" y2="144" stroke="#a8a29e" stroke-width="1" opacity="0.3"/>
  <line x1="113" y1="150" x2="147" y2="150" stroke="#a8a29e" stroke-width="1" opacity="0.3"/>
  <line x1="167" y1="144" x2="196" y2="115" stroke="#a8a29e" stroke-width="1" opacity="0.3"/>

  <text x="130" y="180" class="lab" font-size="9" fill="#78716c" text-anchor="middle">sees 1 path, misses 2</text>

  <!-- Right: Resistance -->
  <rect x="270" y="10" width="240" height="180" rx="6" fill="#ffffff" stroke="#e5e2de" stroke-width="1"/>
  <text x="390" y="30" class="lab" font-size="11" fill="#b45309" text-anchor="middle" font-weight="600">Resistance: R &#8776; 1.0&#937;</text>

  <circle cx="310" cy="105" r="14" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="2"/>
  <text x="310" y="109" class="lab" font-size="9" fill="#d97706" text-anchor="middle">S</text>
  <circle cx="470" cy="105" r="14" fill="#0f766e" opacity="0.15" stroke="#0f766e" stroke-width="2"/>
  <text x="470" y="109" class="lab" font-size="9" fill="#0f766e" text-anchor="middle">T</text>

  <!-- All 3 paths highlighted -->
  <circle cx="363" cy="60" r="10" fill="#b45309" opacity="0.12" stroke="#b45309" stroke-width="1.5"/>
  <circle cx="417" cy="60" r="10" fill="#b45309" opacity="0.12" stroke="#b45309" stroke-width="1.5"/>
  <line x1="324" y1="95" x2="353" y2="66" stroke="#b45309" stroke-width="2.5" opacity="0.7"/>
  <line x1="373" y1="60" x2="407" y2="60" stroke="#b45309" stroke-width="2.5" opacity="0.7"/>
  <line x1="427" y1="66" x2="456" y2="95" stroke="#b45309" stroke-width="2.5" opacity="0.7"/>

  <circle cx="363" cy="105" r="10" fill="#b45309" opacity="0.12" stroke="#b45309" stroke-width="1.5"/>
  <circle cx="417" cy="105" r="10" fill="#b45309" opacity="0.12" stroke="#b45309" stroke-width="1.5"/>
  <line x1="324" y1="105" x2="353" y2="105" stroke="#b45309" stroke-width="2.5" opacity="0.7"/>
  <line x1="373" y1="105" x2="407" y2="105" stroke="#b45309" stroke-width="2.5" opacity="0.7"/>
  <line x1="427" y1="105" x2="456" y2="105" stroke="#b45309" stroke-width="2.5" opacity="0.7"/>

  <circle cx="363" cy="150" r="10" fill="#b45309" opacity="0.12" stroke="#b45309" stroke-width="1.5"/>
  <circle cx="417" cy="150" r="10" fill="#b45309" opacity="0.12" stroke="#b45309" stroke-width="1.5"/>
  <line x1="324" y1="115" x2="353" y2="144" stroke="#b45309" stroke-width="2.5" opacity="0.7"/>
  <line x1="373" y1="150" x2="407" y2="150" stroke="#b45309" stroke-width="2.5" opacity="0.7"/>
  <line x1="427" y1="144" x2="456" y2="115" stroke="#b45309" stroke-width="2.5" opacity="0.7"/>

  <text x="390" y="180" class="lab" font-size="9" fill="#b45309" text-anchor="middle">all 3 paths carry current</text>
</svg>
